<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <style>
      :root {
        --app-height: 100%;
      }
      html, body {
        margin: 0;
        padding: 0;
        /* height: 100%; */
        height: var(--app-height);
        width: 100%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      html {
        background: linear-gradient(to bottom right, black 0%, black 50%, white 50%, white 100%) no-repeat center center;
      }
      body {
        background: linear-gradient(to bottom right, darkgrey 0%, darkgrey 50%, grey 50%, grey 100%) no-repeat center center;
      }
      .content-container {
        background: linear-gradient(to bottom right,white 0%, white 50%, black 50%, black 100%) no-repeat center center;
        /* height: 100%; */
        height: var(--app-height);
        overflow: hidden;
        width: 90%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .logo-container {
        background: yellow;
        height: 60px;
      }
      .tab-panes {
        background: blue;
        flex: 1;
        overflow-y: auto;
      }
      .nav-main {
        background: red;
        height: 60px;
      }
    </style>
  </head>
  <body>
    <div class="content-container">
      <div class="logo-container">logo</div>
      <div class="tab-panes">content</div>
      <nav class="nav-main">nav</nav>
    </div>
