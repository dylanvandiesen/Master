<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitchy — Signal Loss</title>
  <style>
    :root {
      --bg: #04060a;
      --ink: #d7f4ff;
      --glow: rgba(105, 233, 255, 0.45);
      --signal: 1;
      --tear: 0px;
      --noise-alpha: 0.085;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, #11192a 0%, #090e18 45%, #03060b 100%);
      color: var(--ink);
      overflow: hidden;
      font-family: "IBM Plex Mono", "Consolas", "Menlo", monospace;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      filter: url(#signal-distort);
      transform: translateY(var(--tear));
      animation: field-jitter 4s infinite steps(1, end);
      will-change: transform, filter;
    }

    .panel {
      position: relative;
      width: min(1100px, 92vw);
      height: min(72vh, 700px);
      border-radius: 16px;
      border: 1px solid rgba(157, 216, 255, 0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
        repeating-linear-gradient(
          0deg,
          rgba(150, 255, 221, 0.03) 0px,
          rgba(150, 255, 221, 0.03) 1px,
          transparent 2px,
          transparent 4px
        ),
        radial-gradient(circle at 50% 8%, rgba(72, 227, 255, 0.2), transparent 55%),
        #050914;
      box-shadow:
        inset 0 0 120px rgba(100, 220, 255, 0.1),
        0 12px 40px rgba(0, 0, 0, 0.65),
        0 0 38px rgba(87, 198, 255, 0.16);
      overflow: hidden;
      isolation: isolate;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      inset: -12%;
      pointer-events: none;
    }

    .panel::before {
      background: repeating-linear-gradient(
        to bottom,
        rgba(180, 255, 230, 0.075) 0px,
        rgba(180, 255, 230, 0.075) 1px,
        transparent 2px,
        transparent 3px
      );
      mix-blend-mode: screen;
      opacity: calc(0.4 * var(--signal));
      animation: scan 7s linear infinite;
    }

    .panel::after {
      background: radial-gradient(circle at 50% 48%, transparent 45%, rgba(0, 0, 0, 0.4) 100%);
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    .content {
      position: relative;
      height: 100%;
      padding: 2.2rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.5rem;
      z-index: 2;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: clamp(0.72rem, 1.3vw, 0.92rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 0 12px rgba(160, 249, 255, 0.35);
    }

    .title-wrap {
      display: grid;
      place-items: center;
      align-self: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 6.2rem);
      line-height: 0.92;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #e1f8ff;
      text-shadow:
        0 0 14px rgba(149, 236, 255, 0.5),
        0 0 48px rgba(57, 200, 255, 0.25);
      position: relative;
      animation: chroma-split 3.6s infinite steps(1, end);
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
      pointer-events: none;
    }

    h1::before {
      color: rgba(255, 40, 103, 0.52);
      transform: translateX(-2px);
      mix-blend-mode: screen;
    }

    h1::after {
      color: rgba(35, 198, 255, 0.58);
      transform: translateX(2px);
      mix-blend-mode: screen;
    }

    .subtitle {
      margin-top: 0.9rem;
      max-width: 58ch;
      font-size: clamp(0.85rem, 1.7vw, 1.08rem);
      opacity: 0.86;
    }

    .telemetry {
      display: flex;
      justify-content: space-between;
      font-size: clamp(0.74rem, 1.35vw, 0.92rem);
      opacity: 0.8;
      letter-spacing: 0.04em;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 4;
      mix-blend-mode: screen;
      opacity: var(--noise-alpha);
      pointer-events: none;
    }

    .sync-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 2px;
      z-index: 5;
      background: linear-gradient(90deg, transparent, rgba(185, 252, 255, 0.95), transparent);
      filter: blur(0.35px);
      opacity: 0;
      pointer-events: none;
      animation: sync-sweep 8s linear infinite;
    }

    .dropout {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.8) 0px,
        rgba(0, 0, 0, 0.8) 2px,
        transparent 3px,
        transparent 7px
      );
      opacity: 0;
    }

    body.glitch-burst .dropout {
      animation: dropout .18s steps(2, end) 2;
    }

    body.glitch-burst {
      --noise-alpha: 0.18;
      --tear: 2px;
    }

    body.signal-loss {
      --signal: 0.45;
      --noise-alpha: 0.27;
    }

    @keyframes scan {
      from { transform: translateY(0); }
      to { transform: translateY(3px); }
    }

    @keyframes sync-sweep {
      0%, 80%, 100% { transform: translateY(-8vh); opacity: 0; }
      82% { opacity: 0.8; }
      90% { transform: translateY(110vh); opacity: 0.35; }
    }

    @keyframes field-jitter {
      0%, 80%, 100% { transform: translate3d(0, var(--tear), 0); }
      81% { transform: translate3d(0.8px, calc(var(--tear) - 1px), 0); }
      82% { transform: translate3d(-1px, calc(var(--tear) + 2px), 0); }
      83% { transform: translate3d(0.6px, var(--tear), 0); }
    }

    @keyframes chroma-split {
      0%, 72%, 100% { filter: saturate(1) contrast(1); }
      73% { transform: translateX(1px); }
      74% { transform: translateX(-1px) skewX(1deg); }
      75% { filter: saturate(1.2) contrast(1.16); }
      76% { transform: translateX(0); }
    }

    @keyframes dropout {
      0% { opacity: 0; }
      15% { opacity: 0.2; }
      55% { opacity: 0.65; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage, .panel::before, .sync-bar, h1 { animation: none !important; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <filter id="signal-distort" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.004 0.018" numOctaves="2" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="B" result="warp"/>
      <feColorMatrix in="warp" type="matrix" values="1.05 0 0 0 0  0 1.02 0 0 0  0 0 1.12 0 0  0 0 0 1 0"/>
    </filter>
  </svg>

  <div class="stage">
    <section class="panel">
      <div class="content">
        <div class="status">
          <span>Transmission: unstable</span>
          <span id="timecode">00:00:00</span>
        </div>

        <div class="title-wrap">
          <h1 data-text="Signal Lost">Signal Lost</h1>
          <p class="subtitle">Drop-in single-file HTML effect using animated SVG distortion, procedural noise, scanlines, sync drift, and randomized burst artifacts.</p>
        </div>

        <div class="telemetry">
          <span>CH 04-A // RF: -92 dBm</span>
          <span id="quality">Link quality: 78%</span>
        </div>
      </div>
    </section>
  </div>

  <canvas class="noise" id="noise" aria-hidden="true"></canvas>
  <div class="sync-bar"></div>
  <div class="dropout"></div>

  <script>
    (() => {
      const body = document.body;
      const noiseCanvas = document.getElementById('noise');
      const quality = document.getElementById('quality');
      const timecode = document.getElementById('timecode');
      const turbulence = document.getElementById('turbulence');
      const displacement = document.querySelector('feDisplacementMap');
      const ctx = noiseCanvas.getContext('2d', { alpha: true });
      let raf = 0;
      let burstUntil = 0;

      function resizeNoise() {
        const scale = Math.max(1, Math.floor(window.devicePixelRatio || 1));
        noiseCanvas.width = Math.floor(window.innerWidth / 3) * scale;
        noiseCanvas.height = Math.floor(window.innerHeight / 3) * scale;
        noiseCanvas.style.width = window.innerWidth + 'px';
        noiseCanvas.style.height = window.innerHeight + 'px';
      }

      function drawNoise() {
        const w = noiseCanvas.width;
        const h = noiseCanvas.height;
        const image = ctx.createImageData(w, h);
        const now = performance.now();
        const heavy = now < burstUntil;

        for (let i = 0; i < image.data.length; i += 4) {
          const grain = Math.random() * 255;
          const stripe = (i / 4 / w + (now * 0.06)) % 11 < (heavy ? 5 : 2) ? 30 : 0;
          image.data[i] = grain + stripe;
          image.data[i + 1] = grain;
          image.data[i + 2] = grain + stripe * 0.45;
          image.data[i + 3] = heavy ? 105 : 70;
        }

        ctx.putImageData(image, 0, 0);
        raf = requestAnimationFrame(drawNoise);
      }

      function formatTimecode() {
        const d = new Date();
        const pad = (v) => String(v).padStart(2, '0');
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      function randomBurst() {
        const now = performance.now();
        const level = Math.random();
        const inBurst = level > 0.62;
        const inLoss = level > 0.9;

        body.classList.toggle('glitch-burst', inBurst);
        body.classList.toggle('signal-loss', inLoss);

        if (inBurst) {
          burstUntil = now + 160 + Math.random() * 260;
          const wobble = (Math.random() * 0.012 + 0.004).toFixed(4);
          turbulence.setAttribute('baseFrequency', `${wobble} ${(0.014 + Math.random() * 0.04).toFixed(4)}`);
          displacement.setAttribute('scale', String(12 + Math.random() * 55));
        } else {
          turbulence.setAttribute('baseFrequency', '0.004 0.018');
          displacement.setAttribute('scale', '0');
        }

        const link = Math.max(18, Math.min(99, Math.round(86 - Math.random() * (inLoss ? 72 : 36))));
        quality.textContent = `Link quality: ${link}%`;
        timecode.textContent = formatTimecode();

        setTimeout(randomBurst, 120 + Math.random() * 420);
      }

      resizeNoise();
      drawNoise();
      randomBurst();
      setInterval(() => { timecode.textContent = formatTimecode(); }, 1000);
      window.addEventListener('resize', resizeNoise, { passive: true });
      window.addEventListener('beforeunload', () => cancelAnimationFrame(raf));
    })();
  </script>
</body>
</html>
