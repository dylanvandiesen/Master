<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitchy — Controlled Signal Loss</title>
  <style>
    :root {
      --signal: 1;
      --tear-x: 0px;
      --tear-y: 0px;
      --noise-alpha: 0.14;
      --scanline-opacity: 0.38;
      --scanline-spacing: 3px;
      --scanline-speed: 5s;
      --scanline-wobble: 6s;
      --rgb-shift: 2px;
      --rgb-opacity: 0.7;
      --sync-speed: 8s;
      --sync-opacity: 0.8;
      --pixel-size: 4px;
      --pixel-opacity: 0.22;
      --bar-thickness: 2px;
      --bar-width: 80%;
      --scan-drift: 8px;
      --screen-opacity: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color: #d7f4ff;
      font-family: "IBM Plex Mono", "Consolas", "Menlo", monospace;
      background: radial-gradient(circle at 50% 40%, #11192a 0%, #090e18 45%, #03060b 100%);
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      filter: url(#signal-distort);
      transform: translate3d(var(--tear-x), var(--tear-y), 0);
      animation: field-jitter 4s infinite steps(1, end);
      opacity: var(--screen-opacity);
      transition: opacity 70ms steps(1, end);
    }

    body.no-jitter .stage { animation: none; }
    body.no-distortion .stage { filter: none; }

    .panel {
      position: relative;
      width: min(1100px, 92vw);
      height: min(72vh, 700px);
      border-radius: 16px;
      border: 1px solid rgba(157, 216, 255, 0.28);
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        radial-gradient(circle at 50% 8%, rgba(72, 227, 255, 0.2), transparent 55%),
        #050914;
      box-shadow:
        inset 0 0 120px rgba(100, 220, 255, 0.1),
        0 12px 40px rgba(0, 0, 0, 0.65),
        0 0 38px rgba(87, 198, 255, 0.16);
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      inset: -12%;
      pointer-events: none;
    }

    .panel::before {
      background: repeating-linear-gradient(
        to bottom,
        rgba(180, 255, 230, 0.08) 0px,
        rgba(180, 255, 230, 0.08) 1px,
        transparent 1px,
        transparent var(--scanline-spacing)
      );
      mix-blend-mode: screen;
      opacity: calc(var(--scanline-opacity) * var(--signal));
      animation:
        scan-drift var(--scanline-speed) linear infinite,
        scan-wobble var(--scanline-wobble) ease-in-out infinite;
    }

    body.no-scanlines .panel::before { display: none; }

    .panel::after {
      background: radial-gradient(circle at 50% 48%, transparent 45%, rgba(0, 0, 0, 0.42) 100%);
      mix-blend-mode: multiply;
      opacity: 0.92;
    }

    .pixel-grid {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: var(--pixel-opacity);
      mix-blend-mode: overlay;
      background-image:
        linear-gradient(rgba(135, 222, 255, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(135, 222, 255, 0.2) 1px, transparent 1px);
      background-size: var(--pixel-size) var(--pixel-size), var(--pixel-size) var(--pixel-size);
      animation: pixel-wander 220ms steps(2, end) infinite;
    }

    body.no-pixelate .pixel-grid { display: none; }

    .tear-bars {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0 18px,
          rgba(186, 233, 255, 0.22) 18px 20px,
          rgba(9, 18, 31, 0.26) 20px 34px,
          transparent 34px 50px
        );
      mix-blend-mode: screen;
    }

    body.glitch-burst .tear-bars {
      opacity: 0.45;
      animation: tear-shift 120ms steps(2, end) infinite;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 2.2rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.5rem;
    }

    .status,
    .telemetry {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: clamp(0.72rem, 1.3vw, 0.92rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 0 12px rgba(160, 249, 255, 0.35);
    }

    .telemetry {
      font-size: clamp(0.74rem, 1.35vw, 0.92rem);
      opacity: 0.82;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .title-wrap {
      text-align: center;
      display: grid;
      place-items: center;
      align-self: center;
    }

    h1 {
      margin: 0;
      position: relative;
      font-size: clamp(2rem, 8vw, 6.2rem);
      line-height: 0.92;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #e1f8ff;
      text-shadow: 0 0 14px rgba(149, 236, 255, 0.5), 0 0 48px rgba(57, 200, 255, 0.25);
      animation: chroma-split 3.6s infinite steps(1, end);
    }

    body.no-chroma h1 { animation: none; }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: var(--rgb-opacity);
      pointer-events: none;
    }

    h1::before {
      color: rgba(255, 40, 103, 0.55);
      transform: translateX(calc(var(--rgb-shift) * -1));
      mix-blend-mode: screen;
    }

    h1::after {
      color: rgba(35, 198, 255, 0.62);
      transform: translateX(var(--rgb-shift));
      mix-blend-mode: screen;
    }

    body.no-chroma h1::before,
    body.no-chroma h1::after { display: none; }

    .subtitle {
      margin-top: 0.9rem;
      max-width: 58ch;
      font-size: clamp(0.85rem, 1.7vw, 1.08rem);
      opacity: 0.86;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 4;
      mix-blend-mode: screen;
      opacity: var(--noise-alpha);
      pointer-events: none;
    }

    body.no-noise .noise { opacity: 0 !important; }

    .sync-bars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }

    .sync-bar {
      position: absolute;
      left: calc((100% - var(--bar-width)) / 2);
      width: var(--bar-width);
      height: var(--bar-thickness);
      border-radius: 999px;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(185, 252, 255, 0.95), transparent);
      filter: blur(0.35px);
      animation: sync-sweep var(--sync-speed) linear infinite;
      animation-delay: var(--bar-delay, 0s);
    }

    body.no-sync .sync-bars { display: none; }

    .dropout {
      position: fixed;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.82) 0px,
        rgba(0, 0, 0, 0.82) 2px,
        transparent 3px,
        transparent 7px
      );
    }

    body.glitch-burst .dropout { animation: dropout 0.2s steps(2, end) 2; }
    body.no-dropout .dropout { display: none; }

    .control-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 11;
      background: rgba(5, 12, 20, 0.8);
      border: 1px solid rgba(153, 231, 255, 0.3);
      color: #d7f4ff;
      border-radius: 8px;
      padding: 0.35rem 0.55rem;
      font: inherit;
      cursor: pointer;
    }

    .controls {
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 10;
      width: min(360px, 94vw);
      max-height: 86vh;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(153, 231, 255, 0.25);
      background: rgba(4, 10, 16, 0.88);
      backdrop-filter: blur(6px);
      padding: 0.85rem;
      display: grid;
      gap: 0.55rem;
      color: #d7f4ff;
      font-size: 0.78rem;
    }

    .controls[hidden] { display: none; }
    .controls label { display: grid; gap: 0.2rem; }
    .controls .row { display: flex; gap: 0.55rem; align-items: center; flex-wrap: wrap; }
    .controls input[type='range'] { width: 100%; }
    .controls button {
      background: #0f2437;
      border: 1px solid rgba(153, 231, 255, 0.3);
      color: #d7f4ff;
      border-radius: 6px;
      padding: 0.35rem 0.5rem;
      cursor: pointer;
      font: inherit;
    }

    @keyframes scan-drift {
      from { background-position: 0 0; }
      to { background-position: 0 var(--scan-drift); }
    }

    @keyframes scan-wobble {
      0%, 100% { transform: translateX(0px); }
      25% { transform: translateX(0.35px); }
      50% { transform: translateX(-0.5px); }
      75% { transform: translateX(0.25px); }
    }

    @keyframes sync-sweep {
      0%, 75%, 100% { transform: translateY(-12vh); opacity: 0; }
      77% { opacity: var(--sync-opacity); }
      92% { transform: translateY(115vh); opacity: 0.35; }
    }

    @keyframes field-jitter {
      0%, 79%, 100% { transform: translate3d(var(--tear-x), var(--tear-y), 0); }
      80% { transform: translate3d(calc(var(--tear-x) + 0.6px), calc(var(--tear-y) - 0.8px), 0); }
      81% { transform: translate3d(calc(var(--tear-x) - 1px), calc(var(--tear-y) + 1.5px), 0); }
      82% { transform: translate3d(calc(var(--tear-x) + 0.4px), var(--tear-y), 0); }
    }

    @keyframes chroma-split {
      0%, 72%, 100% { filter: saturate(1) contrast(1); }
      73% { transform: translateX(1px); }
      74% { transform: translateX(-1px) skewX(1deg); }
      75% { filter: saturate(1.2) contrast(1.16); }
      76% { transform: translateX(0); }
    }

    @keyframes dropout {
      0% { opacity: 0; }
      16% { opacity: 0.2; }
      55% { opacity: 0.68; }
      100% { opacity: 0; }
    }

    @keyframes pixel-wander {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-0.8px, 0.6px); }
    }

    @keyframes tear-shift {
      0%, 100% { transform: translateX(-2px); }
      50% { transform: translateX(3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stage,
      .panel::before,
      .sync-bar,
      h1,
      .pixel-grid,
      .tear-bars { animation: none !important; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position: absolute;">
    <filter id="signal-distort" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.004 0.018" numOctaves="2" seed="17" result="noise"></feTurbulence>
      <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="B" result="warp"></feDisplacementMap>
      <feColorMatrix id="posterize" in="warp" type="matrix" values="1.1 0 0 0 0  0 1.05 0 0 0  0 0 1.15 0 0  0 0 0 1 0"></feColorMatrix>
      <feComponentTransfer in="posterize" result="quantized">
        <feFuncR type="discrete" tableValues="0 0.18 0.35 0.52 0.72 1"></feFuncR>
        <feFuncG type="discrete" tableValues="0 0.2 0.36 0.55 0.75 1"></feFuncG>
        <feFuncB type="discrete" tableValues="0 0.22 0.4 0.58 0.8 1"></feFuncB>
      </feComponentTransfer>
      <feBlend in="warp" in2="quantized" mode="screen"></feBlend>
    </filter>
  </svg>

  <div class="stage">
    <section class="panel">
      <div class="content">
        <div class="status">
          <span id="tx-state">Transmission: unstable</span>
          <span id="timecode">00:00:00</span>
        </div>
        <div class="title-wrap">
          <h1 data-text="Signal Lost">Signal Lost</h1>
          <p class="subtitle">Expanded controls: blackout signal-loss mode, pixelated distortion, multi sync bars, and triggerable runtime API.</p>
        </div>
        <div class="telemetry">
          <span>CH 04-A // RF: -92 dBm</span>
          <span id="quality">Link quality: 78%</span>
        </div>
      </div>
    </section>
  </div>

  <div class="pixel-grid"></div>
  <canvas id="noise" class="noise" aria-hidden="true"></canvas>
  <div class="tear-bars"></div>
  <div id="sync-bars" class="sync-bars"></div>
  <div class="dropout"></div>

  <button id="toggle-controls" class="control-toggle" type="button">Controls</button>
  <aside id="controls" class="controls" hidden></aside>

  <script>
    (() => {
      const DEFAULT_CONFIG = {
        showControls: true,
        debugKeybinds: true,
        autoMode: true,
        enabled: true,
        intensity: 1,
        timing: { baseIntervalMs: 1200, intervalJitterMs: 850, burstMinMs: 140, burstMaxMs: 340, cooldownMs: 170 },
        probability: { burstChance: 0.64, signalLossChance: 0.14, dropoutChance: 0.45, blackoutChance: 0.12 },
        distortion: {
          enabled: true,
          baseFrequencyX: 0.004,
          baseFrequencyY: 0.018,
          burstFrequencyX: 0.02,
          burstFrequencyY: 0.08,
          displacementMin: 8,
          displacementMax: 70,
          blockiness: 0.55
        },
        blackout: { enabled: true, minMs: 80, maxMs: 360, opacityWhenLost: 0, reappearFlash: true },
        noise: { enabled: true, opacity: 0.14, fps: 24, grainStrength: 1.2 },
        scanlines: { enabled: true, opacity: 0.38, speed: 5, spacing: 3, wobbleAmount: 1, driftPx: 8 },
        chroma: { enabled: true, shiftPx: 2, opacity: 0.7 },
        syncBar: { enabled: true, speed: 8, opacity: 0.8, count: 3, thickness: 2, widthPct: 80 },
        pixelate: { enabled: true, pixelSize: 4, opacity: 0.22 },
        jitter: { enabled: true, xPx: 1.4, yPx: 2.8, vHoldChance: 0.22 },
        dropout: { enabled: true }
      };

      const PROFILES = {
        subtle: {
          intensity: 0.62,
          timing: { baseIntervalMs: 1700, intervalJitterMs: 700 },
          probability: { burstChance: 0.45, signalLossChance: 0.07, blackoutChance: 0.04 },
          distortion: { displacementMax: 28, blockiness: 0.25 },
          noise: { opacity: 0.08 },
          scanlines: { opacity: 0.24 },
          pixelate: { opacity: 0.08 }
        },
        broadcast: {},
        signalLoss: {
          intensity: 1.25,
          timing: { baseIntervalMs: 860, intervalJitterMs: 450 },
          probability: { burstChance: 0.75, signalLossChance: 0.42, dropoutChance: 0.72, blackoutChance: 0.28 },
          distortion: { displacementMin: 20, displacementMax: 98, blockiness: 0.75 },
          blackout: { minMs: 140, maxMs: 650 },
          noise: { opacity: 0.22 }
        },
        aggressive: {
          intensity: 1.45,
          timing: { baseIntervalMs: 760, intervalJitterMs: 420 },
          probability: { burstChance: 0.85, signalLossChance: 0.44, dropoutChance: 0.8, blackoutChance: 0.35 },
          distortion: { burstFrequencyX: 0.026, burstFrequencyY: 0.11, displacementMin: 26, displacementMax: 120, blockiness: 0.9 },
          scanlines: { speed: 2.6, wobbleAmount: 1.6, driftPx: 14 },
          chroma: { shiftPx: 3.8 },
          syncBar: { count: 5, thickness: 3 }
        }
      };
      PROFILES.broadcast = {};

      const elements = {
        body: document.body,
        noise: document.getElementById('noise'),
        turbulence: document.getElementById('turbulence'),
        displacement: document.getElementById('displacement'),
        posterize: document.getElementById('posterize'),
        quality: document.getElementById('quality'),
        state: document.getElementById('tx-state'),
        timecode: document.getElementById('timecode'),
        controls: document.getElementById('controls'),
        toggleControls: document.getElementById('toggle-controls'),
        syncBars: document.getElementById('sync-bars')
      };
      const ctx = elements.noise.getContext('2d', { alpha: true });

      const state = {
        config: sanitizeConfig(structuredClone(DEFAULT_CONFIG)),
        running: false,
        paused: false,
        timer: 0,
        raf: 0,
        noiseNextAt: 0,
        burstUntil: 0,
        signalLossUntil: 0,
        hiddenPause: false,
        blackoutUntil: 0
      };

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, Number(v)));
      }

      function deepMerge(base, patch) {
        if (!patch || typeof patch !== 'object') return base;
        const out = Array.isArray(base) ? [...base] : { ...base };
        for (const [k, v] of Object.entries(patch)) {
          const cur = out[k];
          out[k] = v && typeof v === 'object' && !Array.isArray(v) && cur && typeof cur === 'object'
            ? deepMerge(cur, v)
            : v;
        }
        return out;
      }

      function sanitizeConfig(config) {
        config.intensity = clamp(config.intensity ?? 1, 0, 2.5);
        config.timing.baseIntervalMs = clamp(config.timing.baseIntervalMs, 120, 12000);
        config.timing.intervalJitterMs = clamp(config.timing.intervalJitterMs, 0, 6000);
        config.timing.burstMinMs = clamp(config.timing.burstMinMs, 40, 2000);
        config.timing.burstMaxMs = clamp(config.timing.burstMaxMs, config.timing.burstMinMs, 4000);
        config.timing.cooldownMs = clamp(config.timing.cooldownMs, 0, 2500);

        config.probability.burstChance = clamp(config.probability.burstChance, 0, 1);
        config.probability.signalLossChance = clamp(config.probability.signalLossChance, 0, 1);
        config.probability.dropoutChance = clamp(config.probability.dropoutChance, 0, 1);
        config.probability.blackoutChance = clamp(config.probability.blackoutChance, 0, 1);

        config.distortion.baseFrequencyX = clamp(config.distortion.baseFrequencyX, 0, 0.04);
        config.distortion.baseFrequencyY = clamp(config.distortion.baseFrequencyY, 0, 0.16);
        config.distortion.burstFrequencyX = clamp(config.distortion.burstFrequencyX, 0, 0.09);
        config.distortion.burstFrequencyY = clamp(config.distortion.burstFrequencyY, 0, 0.24);
        config.distortion.displacementMin = clamp(config.distortion.displacementMin, 0, 300);
        config.distortion.displacementMax = clamp(config.distortion.displacementMax, config.distortion.displacementMin, 400);
        config.distortion.blockiness = clamp(config.distortion.blockiness, 0, 1);

        config.blackout.minMs = clamp(config.blackout.minMs, 20, 2000);
        config.blackout.maxMs = clamp(config.blackout.maxMs, config.blackout.minMs, 6000);
        config.blackout.opacityWhenLost = clamp(config.blackout.opacityWhenLost, 0, 1);

        config.noise.opacity = clamp(config.noise.opacity, 0, 0.6);
        config.noise.fps = clamp(config.noise.fps, 1, 60);
        config.noise.grainStrength = clamp(config.noise.grainStrength, 0.2, 3);

        config.scanlines.opacity = clamp(config.scanlines.opacity, 0, 1);
        config.scanlines.speed = clamp(config.scanlines.speed, 1, 20);
        config.scanlines.spacing = clamp(config.scanlines.spacing, 2, 16);
        config.scanlines.wobbleAmount = clamp(config.scanlines.wobbleAmount, 0, 4);
        config.scanlines.driftPx = clamp(config.scanlines.driftPx, 1, 36);

        config.chroma.shiftPx = clamp(config.chroma.shiftPx, 0, 14);
        config.chroma.opacity = clamp(config.chroma.opacity, 0, 1);

        config.syncBar.speed = clamp(config.syncBar.speed, 2, 20);
        config.syncBar.opacity = clamp(config.syncBar.opacity, 0, 1);
        config.syncBar.count = clamp(config.syncBar.count, 1, 8);
        config.syncBar.thickness = clamp(config.syncBar.thickness, 1, 8);
        config.syncBar.widthPct = clamp(config.syncBar.widthPct, 20, 100);

        config.pixelate.pixelSize = clamp(config.pixelate.pixelSize, 2, 20);
        config.pixelate.opacity = clamp(config.pixelate.opacity, 0, 0.8);

        config.jitter.xPx = clamp(config.jitter.xPx, 0, 16);
        config.jitter.yPx = clamp(config.jitter.yPx, 0, 16);
        config.jitter.vHoldChance = clamp(config.jitter.vHoldChance, 0, 1);

        return config;
      }

      function setCssVar(name, value) {
        document.documentElement.style.setProperty(name, String(value));
      }

      function renderSyncBars() {
        const c = state.config.syncBar;
        elements.syncBars.innerHTML = '';
        for (let i = 0; i < c.count; i += 1) {
          const bar = document.createElement('div');
          bar.className = 'sync-bar';
          bar.style.setProperty('--bar-delay', `${(i / c.count) * c.speed}s`);
          elements.syncBars.appendChild(bar);
        }
      }

      function applyConfigToUI() {
        const c = state.config;
        setCssVar('--noise-alpha', c.noise.opacity.toFixed(3));
        setCssVar('--scanline-opacity', c.scanlines.opacity.toFixed(3));
        setCssVar('--scanline-spacing', `${c.scanlines.spacing}px`);
        setCssVar('--scanline-speed', `${c.scanlines.speed.toFixed(2)}s`);
        setCssVar('--scanline-wobble', `${(5 / Math.max(c.scanlines.wobbleAmount, 0.1)).toFixed(2)}s`);
        setCssVar('--scan-drift', `${c.scanlines.driftPx.toFixed(1)}px`);
        setCssVar('--rgb-shift', `${c.chroma.shiftPx.toFixed(2)}px`);
        setCssVar('--rgb-opacity', c.chroma.opacity.toFixed(3));
        setCssVar('--sync-speed', `${c.syncBar.speed.toFixed(2)}s`);
        setCssVar('--sync-opacity', c.syncBar.opacity.toFixed(3));
        setCssVar('--pixel-size', `${c.pixelate.pixelSize.toFixed(1)}px`);
        setCssVar('--pixel-opacity', c.pixelate.opacity.toFixed(3));
        setCssVar('--bar-thickness', `${c.syncBar.thickness.toFixed(1)}px`);
        setCssVar('--bar-width', `${c.syncBar.widthPct.toFixed(1)}%`);

        elements.body.classList.toggle('no-noise', !(c.enabled && c.noise.enabled));
        elements.body.classList.toggle('no-scanlines', !(c.enabled && c.scanlines.enabled));
        elements.body.classList.toggle('no-distortion', !(c.enabled && c.distortion.enabled));
        elements.body.classList.toggle('no-chroma', !(c.enabled && c.chroma.enabled));
        elements.body.classList.toggle('no-jitter', !(c.enabled && c.jitter.enabled));
        elements.body.classList.toggle('no-sync', !(c.enabled && c.syncBar.enabled));
        elements.body.classList.toggle('no-dropout', !(c.enabled && c.dropout.enabled));
        elements.body.classList.toggle('no-pixelate', !(c.enabled && c.pixelate.enabled));

        if (!c.enabled || !c.distortion.enabled) elements.displacement.setAttribute('scale', '0');
        if (!c.enabled) elements.state.textContent = 'Transmission: paused';

        elements.toggleControls.style.display = c.showControls ? 'block' : 'none';
        renderSyncBars();
      }

      function resizeNoise() {
        const scale = Math.max(1, Math.floor(window.devicePixelRatio || 1));
        elements.noise.width = Math.max(1, Math.floor(window.innerWidth / 3) * scale);
        elements.noise.height = Math.max(1, Math.floor(window.innerHeight / 3) * scale);
        elements.noise.style.width = `${window.innerWidth}px`;
        elements.noise.style.height = `${window.innerHeight}px`;
      }

      function drawNoiseFrame(now) {
        const c = state.config;
        if (!(c.enabled && c.noise.enabled)) {
          state.raf = requestAnimationFrame(drawNoiseFrame);
          return;
        }

        const msPerFrame = 1000 / c.noise.fps;
        if (now < state.noiseNextAt) {
          state.raf = requestAnimationFrame(drawNoiseFrame);
          return;
        }
        state.noiseNextAt = now + msPerFrame;

        const w = elements.noise.width;
        const h = elements.noise.height;
        const image = ctx.createImageData(w, h);
        const heavy = now < state.burstUntil;

        for (let i = 0; i < image.data.length; i += 4) {
          const grain = Math.random() * 255 * c.noise.grainStrength;
          const stripe = (i / 4 / w + now * 0.05) % 11 < (heavy ? 5 : 2) ? 35 : 0;
          image.data[i] = Math.min(255, grain + stripe);
          image.data[i + 1] = Math.min(255, grain);
          image.data[i + 2] = Math.min(255, grain + stripe * 0.45);
          image.data[i + 3] = heavy ? 125 : 78;
        }

        ctx.putImageData(image, 0, 0);
        state.raf = requestAnimationFrame(drawNoiseFrame);
      }

      function formatTimecode() {
        const d = new Date();
        const pad = (v) => String(v).padStart(2, '0');
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }

      function updateTelemetry(signalLoss) {
        const link = Math.max(8, Math.min(99, Math.round(90 - Math.random() * (signalLoss ? 76 : 36))));
        elements.quality.textContent = `Link quality: ${link}%`;
        elements.timecode.textContent = formatTimecode();
      }

      function setDistortion(scale, freqX, freqY, blockiness = 0.5) {
        elements.turbulence.setAttribute('baseFrequency', `${freqX.toFixed(4)} ${freqY.toFixed(4)}`);
        elements.displacement.setAttribute('scale', String(scale.toFixed(2)));
        const lift = 1 + blockiness * 0.35;
        elements.posterize.setAttribute(
          'values',
          `${lift.toFixed(2)} 0 0 0 0  0 ${(1 + blockiness * 0.2).toFixed(2)} 0 0 0  0 0 ${(1 + blockiness * 0.4).toFixed(2)} 0 0  0 0 0 1 0`
        );
      }

      function randomSigned(maxAbs) {
        return (Math.random() * 2 - 1) * maxAbs;
      }

      function triggerBurst(options = {}) {
        const c = state.config;
        if (!c.enabled) return;
        const intensity = clamp(options.intensity ?? c.intensity, 0, 3);
        const duration = clamp(
          options.durationMs ?? (c.timing.burstMinMs + Math.random() * (c.timing.burstMaxMs - c.timing.burstMinMs)),
          40,
          5000
        );
        state.burstUntil = performance.now() + duration;
        elements.body.classList.add('glitch-burst');

        if (c.distortion.enabled) {
          const freqX = c.distortion.baseFrequencyX + Math.random() * c.distortion.burstFrequencyX * intensity;
          const freqY = c.distortion.baseFrequencyY + Math.random() * c.distortion.burstFrequencyY * intensity;
          const scale = c.distortion.displacementMin + Math.random() * (c.distortion.displacementMax - c.distortion.displacementMin) * intensity;
          setDistortion(scale, freqX, freqY, c.distortion.blockiness);
        }

        if (c.jitter.enabled) {
          setCssVar('--tear-x', `${randomSigned(c.jitter.xPx * intensity).toFixed(2)}px`);
          setCssVar('--tear-y', `${randomSigned(c.jitter.yPx * intensity).toFixed(2)}px`);
        }

        setTimeout(() => {
          elements.body.classList.remove('glitch-burst');
          setCssVar('--tear-x', '0px');
          setCssVar('--tear-y', '0px');
          if (c.distortion.enabled) {
            setDistortion(0, c.distortion.baseFrequencyX, c.distortion.baseFrequencyY, c.distortion.blockiness);
          }
        }, duration);
      }

      function triggerBlackout(options = {}) {
        const c = state.config;
        if (!(c.enabled && c.blackout.enabled)) return;
        const duration = clamp(
          options.durationMs ?? (c.blackout.minMs + Math.random() * (c.blackout.maxMs - c.blackout.minMs)),
          20,
          8000
        );
        state.blackoutUntil = performance.now() + duration;
        setCssVar('--screen-opacity', c.blackout.opacityWhenLost.toFixed(3));
        elements.state.textContent = 'Transmission: blackout';
        setTimeout(() => {
          setCssVar('--screen-opacity', '1');
          elements.state.textContent = 'Transmission: unstable';
          if (c.blackout.reappearFlash) {
            triggerBurst({ durationMs: 90, intensity: 1.8 });
          }
        }, duration);
      }

      function triggerSignalLoss(options = {}) {
        const c = state.config;
        if (!c.enabled) return;
        const duration = clamp(options.durationMs ?? (220 + Math.random() * 800), 50, 7000);
        state.signalLossUntil = performance.now() + duration;
        setCssVar('--signal', '0.45');
        elements.state.textContent = 'Transmission: signal loss';
        if (c.dropout.enabled && Math.random() < c.probability.dropoutChance) triggerDropout();
        if (c.blackout.enabled && Math.random() < c.probability.blackoutChance) triggerBlackout();
        setTimeout(() => {
          setCssVar('--signal', '1');
          if (performance.now() > state.blackoutUntil) {
            elements.state.textContent = 'Transmission: unstable';
          }
        }, duration);
      }

      function triggerDropout() {
        if (!(state.config.enabled && state.config.dropout.enabled)) return;
        elements.body.classList.add('glitch-burst');
        setTimeout(() => elements.body.classList.remove('glitch-burst'), 220);
      }

      function triggerSequence(sequence = []) {
        let at = 0;
        for (const step of sequence) {
          at += clamp(step.delayMs ?? 100, 0, 10000);
          setTimeout(() => {
            if (step.type === 'burst') triggerBurst(step);
            if (step.type === 'loss') triggerSignalLoss(step);
            if (step.type === 'dropout') triggerDropout(step);
            if (step.type === 'blackout') triggerBlackout(step);
          }, at);
        }
      }

      function computeNextDelay() {
        const c = state.config;
        const jitter = (Math.random() * 2 - 1) * c.timing.intervalJitterMs;
        return Math.max(120, c.timing.baseIntervalMs + jitter);
      }

      function schedulerTick() {
        if (!state.running || state.paused) return;
        const c = state.config;

        if (c.enabled && c.autoMode) {
          if (Math.random() < c.probability.burstChance) triggerBurst();
          const doLoss = Math.random() < c.probability.signalLossChance;
          if (doLoss) triggerSignalLoss();
          if (!doLoss && Math.random() < c.probability.dropoutChance * 0.35) triggerDropout();
          if (!doLoss && c.blackout.enabled && Math.random() < c.probability.blackoutChance * 0.4) triggerBlackout();
          updateTelemetry(doLoss);
        } else {
          elements.timecode.textContent = formatTimecode();
        }

        const delay = computeNextDelay() + c.timing.cooldownMs;
        state.timer = window.setTimeout(schedulerTick, delay);
      }

      function start() {
        if (state.running) return;
        state.running = true;
        state.paused = false;
        state.timer = window.setTimeout(schedulerTick, computeNextDelay());
      }

      function stop() {
        state.running = false;
        state.paused = false;
        window.clearTimeout(state.timer);
        state.timer = 0;
      }

      function pause() {
        state.paused = true;
        window.clearTimeout(state.timer);
      }

      function resume() {
        if (!state.running) start();
        state.paused = false;
        window.clearTimeout(state.timer);
        state.timer = window.setTimeout(schedulerTick, computeNextDelay());
      }

      function setConfig(partial) {
        state.config = sanitizeConfig(deepMerge(state.config, partial));
        applyConfigToUI();
        renderControls();
      }

      function setEnabled(enabled) {
        setConfig({ enabled: Boolean(enabled) });
      }

      function setEffectEnabled(effectName, isEnabled) {
        const map = {
          noise: ['noise', 'enabled'],
          scanlines: ['scanlines', 'enabled'],
          distortion: ['distortion', 'enabled'],
          chroma: ['chroma', 'enabled'],
          jitter: ['jitter', 'enabled'],
          syncBar: ['syncBar', 'enabled'],
          dropout: ['dropout', 'enabled'],
          pixelate: ['pixelate', 'enabled'],
          blackout: ['blackout', 'enabled']
        };
        const target = map[effectName];
        if (!target) return;
        const [group, key] = target;
        setConfig({ [group]: { [key]: Boolean(isEnabled) } });
      }

      function applyProfile(name) {
        const profile = PROFILES[name];
        if (!profile) return false;
        setConfig(profile);
        return true;
      }

      function getConfig() {
        return structuredClone(state.config);
      }

      function resetConfig() {
        state.config = sanitizeConfig(structuredClone(DEFAULT_CONFIG));
        applyConfigToUI();
        renderControls();
      }

      function bindVisibility() {
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && state.running) {
            state.hiddenPause = true;
            pause();
          } else if (!document.hidden && state.hiddenPause) {
            state.hiddenPause = false;
            resume();
          }
        });
      }

      function bindEvents() {
        window.addEventListener('glitch:burst', (event) => triggerBurst(event.detail || {}));
        window.addEventListener('glitch:signal-loss', (event) => triggerSignalLoss(event.detail || {}));
        window.addEventListener('glitch:dropout', () => triggerDropout());
        window.addEventListener('glitch:blackout', (event) => triggerBlackout(event.detail || {}));

        if (state.config.debugKeybinds) {
          window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'g') triggerBurst();
            if (event.key.toLowerCase() === 'l') triggerSignalLoss();
            if (event.key.toLowerCase() === 'd') triggerDropout();
            if (event.key.toLowerCase() === 'b') triggerBlackout();
          });
        }

        elements.toggleControls.addEventListener('click', () => {
          elements.controls.hidden = !elements.controls.hidden;
        });
      }

      function addRangeField(parent, label, min, max, step, value, onInput) {
        const wrapper = document.createElement('label');
        wrapper.textContent = `${label}: ${value}`;
        const input = document.createElement('input');
        input.type = 'range';
        input.min = String(min);
        input.max = String(max);
        input.step = String(step);
        input.value = String(value);
        input.addEventListener('input', () => {
          wrapper.firstChild.textContent = `${label}: ${input.value}`;
          onInput(Number(input.value));
        });
        wrapper.appendChild(input);
        parent.appendChild(wrapper);
      }

      function addToggleField(parent, label, checked, onChange) {
        const row = document.createElement('label');
        row.className = 'row';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = checked;
        input.addEventListener('change', () => onChange(input.checked));
        const txt = document.createElement('span');
        txt.textContent = label;
        row.append(input, txt);
        parent.appendChild(row);
      }

      function renderControls() {
        const c = state.config;
        const root = elements.controls;
        root.innerHTML = '';

        addToggleField(root, 'Master enabled', c.enabled, (v) => setEnabled(v));
        addToggleField(root, 'Auto mode', c.autoMode, (v) => setConfig({ autoMode: v }));

        addRangeField(root, 'Base interval (ms)', 120, 4000, 10, c.timing.baseIntervalMs, (v) => setConfig({ timing: { baseIntervalMs: v } }));
        addRangeField(root, 'Interval jitter (ms)', 0, 2500, 10, c.timing.intervalJitterMs, (v) => setConfig({ timing: { intervalJitterMs: v } }));
        addRangeField(root, 'Burst chance', 0, 1, 0.01, c.probability.burstChance, (v) => setConfig({ probability: { burstChance: v } }));
        addRangeField(root, 'Signal-loss chance', 0, 1, 0.01, c.probability.signalLossChance, (v) => setConfig({ probability: { signalLossChance: v } }));
        addRangeField(root, 'Blackout chance', 0, 1, 0.01, c.probability.blackoutChance, (v) => setConfig({ probability: { blackoutChance: v } }));
        addRangeField(root, 'Blackout min ms', 20, 2000, 10, c.blackout.minMs, (v) => setConfig({ blackout: { minMs: v } }));
        addRangeField(root, 'Blackout max ms', 20, 4000, 10, c.blackout.maxMs, (v) => setConfig({ blackout: { maxMs: v } }));

        addRangeField(root, 'Distortion max', 0, 180, 1, c.distortion.displacementMax, (v) => setConfig({ distortion: { displacementMax: v } }));
        addRangeField(root, 'Blockiness', 0, 1, 0.01, c.distortion.blockiness, (v) => setConfig({ distortion: { blockiness: v } }));
        addRangeField(root, 'Pixel size', 2, 20, 1, c.pixelate.pixelSize, (v) => setConfig({ pixelate: { pixelSize: v } }));
        addRangeField(root, 'Pixel opacity', 0, 0.8, 0.01, c.pixelate.opacity, (v) => setConfig({ pixelate: { opacity: v } }));

        addRangeField(root, 'Noise opacity', 0, 0.6, 0.01, c.noise.opacity, (v) => setConfig({ noise: { opacity: v } }));
        addRangeField(root, 'Scanline speed', 1, 20, 0.1, c.scanlines.speed, (v) => setConfig({ scanlines: { speed: v } }));
        addRangeField(root, 'Scanline spacing', 2, 16, 1, c.scanlines.spacing, (v) => setConfig({ scanlines: { spacing: v } }));
        addRangeField(root, 'Scan drift px', 1, 36, 1, c.scanlines.driftPx, (v) => setConfig({ scanlines: { driftPx: v } }));
        addRangeField(root, 'Sync count', 1, 8, 1, c.syncBar.count, (v) => setConfig({ syncBar: { count: v } }));
        addRangeField(root, 'Sync speed', 2, 20, 0.1, c.syncBar.speed, (v) => setConfig({ syncBar: { speed: v } }));
        addRangeField(root, 'Sync thickness', 1, 8, 1, c.syncBar.thickness, (v) => setConfig({ syncBar: { thickness: v } }));
        addRangeField(root, 'Sync width %', 20, 100, 1, c.syncBar.widthPct, (v) => setConfig({ syncBar: { widthPct: v } }));

        addToggleField(root, 'Noise', c.noise.enabled, (v) => setEffectEnabled('noise', v));
        addToggleField(root, 'Scanlines', c.scanlines.enabled, (v) => setEffectEnabled('scanlines', v));
        addToggleField(root, 'Distortion', c.distortion.enabled, (v) => setEffectEnabled('distortion', v));
        addToggleField(root, 'Dropout', c.dropout.enabled, (v) => setEffectEnabled('dropout', v));
        addToggleField(root, 'Chroma', c.chroma.enabled, (v) => setEffectEnabled('chroma', v));
        addToggleField(root, 'Sync bars', c.syncBar.enabled, (v) => setEffectEnabled('syncBar', v));
        addToggleField(root, 'Jitter', c.jitter.enabled, (v) => setEffectEnabled('jitter', v));
        addToggleField(root, 'Pixel overlay', c.pixelate.enabled, (v) => setEffectEnabled('pixelate', v));
        addToggleField(root, 'Blackout mode', c.blackout.enabled, (v) => setEffectEnabled('blackout', v));

        const row = document.createElement('div');
        row.className = 'row';
        ['subtle', 'broadcast', 'signalLoss', 'aggressive'].forEach((name) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.textContent = name;
          button.addEventListener('click', () => applyProfile(name));
          row.appendChild(button);
        });

        const tBurst = document.createElement('button');
        tBurst.textContent = 'trigger burst';
        tBurst.addEventListener('click', () => triggerBurst());
        row.appendChild(tBurst);

        const tLoss = document.createElement('button');
        tLoss.textContent = 'trigger loss';
        tLoss.addEventListener('click', () => triggerSignalLoss());
        row.appendChild(tLoss);

        const tBlackout = document.createElement('button');
        tBlackout.textContent = 'trigger blackout';
        tBlackout.addEventListener('click', () => triggerBlackout());
        row.appendChild(tBlackout);

        const reset = document.createElement('button');
        reset.type = 'button';
        reset.textContent = 'reset';
        reset.addEventListener('click', resetConfig);
        row.appendChild(reset);

        root.appendChild(row);
      }

      function initReducedMotion() {
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduced) {
          setConfig({
            autoMode: false,
            noise: { fps: 8, opacity: 0.06 },
            scanlines: { speed: 12 },
            jitter: { enabled: false },
            syncBar: { enabled: false },
            pixelate: { opacity: 0.08 }
          });
        }
      }

      function init() {
        resizeNoise();
        bindEvents();
        bindVisibility();
        initReducedMotion();
        applyConfigToUI();
        renderControls();
        elements.controls.hidden = !state.config.showControls;
        state.raf = requestAnimationFrame(drawNoiseFrame);
        start();
        setInterval(() => { elements.timecode.textContent = formatTimecode(); }, 1000);
      }

      window.Glitchy = {
        enable: () => setEnabled(true),
        disable: () => setEnabled(false),
        toggle: () => setEnabled(!state.config.enabled),
        setEnabled,
        start,
        stop,
        pause,
        resume,
        isRunning: () => state.running && !state.paused,
        setConfig,
        getConfig,
        resetConfig,
        setEffectEnabled,
        applyProfile,
        triggerBurst,
        triggerSignalLoss,
        triggerDropout,
        triggerBlackout,
        triggerSequence
      };

      window.addEventListener('resize', resizeNoise, { passive: true });
      window.addEventListener('beforeunload', () => {
        stop();
        cancelAnimationFrame(state.raf);
      });

      init();
    })();
  </script>
</body>
</html>
