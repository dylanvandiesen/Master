<svg class="loading-spinner" xmlns="http://www.w3.org/2000/svg" xmlns:v="https://vecta.io/nano" viewBox="0 0 100 100" fill="#c550fc">
    <style>
        path.spinner-circle {
            will-change: transform;
            animation: spinner 1s linear 10;
            transform-origin: center;
        }
        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }    
    </style> 
